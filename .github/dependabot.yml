# Dependabot Configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Monitorar dependências npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      # Verificar todo dia
      interval: "daily"
      time: "09:00"
      timezone: "America/Sao_Paulo"

    # Limitar número de PRs abertas simultaneamente
    # (para não sobrecarregar)
    open-pull-requests-limit: 5

    # Agrupar PRs para reduzir spam
    groups:
      # Agrupar dependências de desenvolvimento
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

      # Agrupar dependências de produção (minor/patch)
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

    # Permitir Dependabot acessar registry privado (se necessário)
    # registries: "*"

    # Labels para adicionar nas PRs
    labels:
      - "dependencies"
      - "security"

    # Reviewers (opcional - adicionar seu username)
    # reviewers:
    #   - "seu-username"

    # Assignees (opcional)
    # assignees:
    #   - "seu-username"

    # Prefixo dos commits
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
